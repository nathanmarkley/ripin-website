<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events Calendar | RIPIN</title>
  <meta name="description" content="View upcoming RIPIN workshops, webinars, support groups, and community events." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/ripin.css">
</head>
<body>

<div id="ripin-banner"></div>
<div id="ripin-nav"></div>

<main>

  <!-- Hero -->
  <section class="ripin-hero" style="padding:3rem 0">
    <div class="container hero-content text-center">
      <h1 class="text-white mb-3">Events Calendar</h1>
      <p class="lead mb-0" style="max-width:540px;margin:0 auto">
        Workshops, webinars, support groups, and community events —
        all free for Rhode Island families.
      </p>
    </div>
  </section>

  <section class="py-5">
    <div class="container-lg">
      <div class="row g-5">

        <!-- ── Calendar grid ──────────────────────────── -->
        <div class="col-lg-8">
          <div class="ripin-card p-4">

            <!-- Month navigation -->
            <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
              <div class="d-flex align-items-center gap-2">
                <button id="prevMonth" class="btn btn-sm btn-outline-secondary rounded-pill px-3">←</button>
                <h2 id="calMonthTitle" class="mb-0 font-display fw-bold" style="font-size:1.375rem;min-width:180px;text-align:center"></h2>
                <button id="nextMonth" class="btn btn-sm btn-outline-secondary rounded-pill px-3">→</button>
              </div>
              <button id="todayBtn" class="btn btn-sm btn-ripin-outline rounded-pill px-3">Today</button>
            </div>

            <!-- Calendar table injected here -->
            <div id="calendarGrid">
              <div class="text-center py-5 text-muted">
                <div class="spinner-border spinner-border-sm me-2"></div>
                Loading calendar…
              </div>
            </div>

          </div>

          <!-- Mobile: upcoming list shown instead of grid -->
          <div class="d-lg-none mt-4">
            <h3 class="section-title mb-3" style="font-size:1.25rem">Upcoming Events</h3>
            <div id="mobileEventList"></div>
          </div>
        </div>

        <!-- ── Sidebar ─────────────────────────────────── -->
        <div class="col-lg-4">

          <!-- Category filter -->
          <div class="ripin-card p-4 mb-4">
            <h5 class="fw-bold mb-3">Filter by Category</h5>
            <div id="categoryFilters" class="d-flex flex-wrap gap-2">
              <button class="filter-pill active" data-cat="all">All Events</button>
              <button class="filter-pill" data-cat="Workshop">Workshops</button>
              <button class="filter-pill" data-cat="Webinar">Webinars</button>
              <button class="filter-pill" data-cat="Support Group">Support Groups</button>
              <button class="filter-pill" data-cat="Meeting">Meetings</button>
              <button class="filter-pill" data-cat="Community Event">Community</button>
            </div>
          </div>

          <!-- Upcoming events list -->
          <div class="ripin-card p-4">
            <h5 class="fw-bold mb-3">Coming Up</h5>
            <div id="upcomingList">
              <div class="text-center py-3 text-muted">
                <div class="spinner-border spinner-border-sm"></div>
              </div>
            </div>
            <a href="#" class="btn btn-ripin-outline w-100 mt-3" 
               onclick="window.scrollTo(0,0);return false">View Full Calendar ↑</a>
          </div>

        </div>
      </div>
    </div>
  </section>

</main>

<div id="ripin-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/partials.js"></script>
<script src="js/sanity.js"></script>
<script>
  renderNav('calendar')
  renderFooter()
  renderBanner()
  renderPopup('calendar')

  // ── Calendar state ──────────────────────────────────────────
  let allEvents    = []
  let filteredEvents = []
  let currentYear  = new Date().getFullYear()
  let currentMonth = new Date().getMonth()
  let activeCategory = 'all'

  const monthNames = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December']

  // ── Load all events ─────────────────────────────────────────
  async function initCalendar() {
    allEvents = await getAllEvents()
    window._ripinEvents = allEvents
    filteredEvents = allEvents
    renderCalendar()
    renderUpcomingList()
    renderMobileList()
  }

  function renderCalendar() {
    document.getElementById('calMonthTitle').textContent =
      `${monthNames[currentMonth]} ${currentYear}`
    buildCalendar('calendarGrid', filteredEvents, currentYear, currentMonth)
  }

  // ── Upcoming sidebar list ───────────────────────────────────
  function renderUpcomingList() {
    const now   = new Date()
    const upcoming = filteredEvents
      .filter(ev => new Date(ev.startDate) >= now)
      .slice(0, 8)

    const el = document.getElementById('upcomingList')

    if (!upcoming.length) {
      el.innerHTML = `<p class="text-muted small text-center py-3">No upcoming events.</p>`
      return
    }

    el.innerHTML = upcoming.map(ev => {
      const d   = new Date(ev.startDate)
      const day = d.getDate()
      const mon = d.toLocaleString('en', { month: 'short' }).toUpperCase()
      return `
        <div class="d-flex gap-3 mb-3 pb-3 border-bottom" 
             style="cursor:pointer" onclick="showEventDetail('${ev._id}')">
          <div class="event-date-badge flex-shrink-0" 
               style="background:${ev.color || 'var(--ripin-blue)'};width:48px;height:48px">
            <span class="day" style="font-size:1.25rem">${day}</span>
            <span class="month" style="font-size:0.6rem">${mon}</span>
          </div>
          <div>
            <div class="fw-semibold" style="font-size:0.9rem;color:var(--ripin-navy)">${ev.title}</div>
            ${ev.location
              ? `<div class="text-muted" style="font-size:0.775rem">📍 ${ev.location}</div>`
              : ''}
            ${ev.category
              ? `<span class="ripin-badge ripin-badge-blue mt-1">${ev.category}</span>`
              : ''}
          </div>
        </div>
      `
    }).join('')
  }

  // ── Mobile list ─────────────────────────────────────────────
  function renderMobileList() {
    const now = new Date()
    const upcoming = filteredEvents.filter(ev => new Date(ev.startDate) >= now)
    const el  = document.getElementById('mobileEventList')
    if (!el) return

    if (!upcoming.length) {
      el.innerHTML = `<p class="text-muted text-center py-3">No upcoming events.</p>`
      return
    }

    el.innerHTML = upcoming.map(ev => {
      const d    = new Date(ev.startDate)
      const date = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' })
      const time = ev.allDay ? 'All day' : d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' })
      return `
        <div class="ripin-card p-3 mb-3" onclick="showEventDetail('${ev._id}')" style="cursor:pointer">
          <div class="d-flex align-items-start gap-3">
            <div class="event-date-badge flex-shrink-0"
                 style="background:${ev.color || 'var(--ripin-blue)'}">
              <span class="day">${d.getDate()}</span>
              <span class="month">${d.toLocaleString('en',{month:'short'}).toUpperCase()}</span>
            </div>
            <div>
              <div class="fw-semibold">${ev.title}</div>
              <div class="text-muted small">${date} · ${time}</div>
              ${ev.location ? `<div class="text-muted small">📍 ${ev.location}</div>` : ''}
            </div>
          </div>
        </div>
      `
    }).join('')
  }

  // ── Navigation ──────────────────────────────────────────────
  document.getElementById('prevMonth').addEventListener('click', () => {
    if (--currentMonth < 0) { currentMonth = 11; currentYear-- }
    renderCalendar()
  })

  document.getElementById('nextMonth').addEventListener('click', () => {
    if (++currentMonth > 11) { currentMonth = 0; currentYear++ }
    renderCalendar()
  })

  document.getElementById('todayBtn').addEventListener('click', () => {
    currentYear  = new Date().getFullYear()
    currentMonth = new Date().getMonth()
    renderCalendar()
  })

  // ── Category filter ─────────────────────────────────────────
  document.getElementById('categoryFilters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-pill')
    if (!btn) return

    document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    activeCategory = btn.dataset.cat

    filteredEvents = activeCategory === 'all'
      ? allEvents
      : allEvents.filter(ev => ev.category === activeCategory)

    renderCalendar()
    renderUpcomingList()
    renderMobileList()
  })

  initCalendar()
</script>
</body>
</html>
