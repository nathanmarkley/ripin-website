# netlify.toml
# Netlify configuration for RIPIN website
# This file lives in the root of your project — don't delete it!

[build]
  publish = "."   # serve files from the root folder

# ── Pretty URLs ───────────────────────────────────────────────
# Makes /about work instead of /about.html
[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/calendar"
  to   = "/calendar.html"
  status = 200

[[redirects]]
  from = "/resources"
  to   = "/resources.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/services"
  to   = "/services.html"
  status = 200

[[redirects]]
  from = "/news"
  to   = "/news.html"
  status = 200

[[redirects]]
  from = "/donate"
  to   = "/donate.html"
  status = 200

# ── Security Headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Cache static assets ───────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
